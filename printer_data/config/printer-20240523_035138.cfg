[include mainsail.cfg]
[include filament_change.cfg]
[include bed_mesh.cfg]
[include filament.cfg]
[exclude_object]
[include Macros.cfg]
[include SpeedTest.cfg]

[gcode_arcs]
resolution: 0.5
[endstop_phase]
[pause_resume]
[respond]

#[include ADXL345.cfg]
#[include ADXL345B.cfg]

[virtual_sdcard]
path: /home/biqu/printer_data/gcodes

[idle_timeout]
timeout: 72000

[probe]
pin: !PC8
x_offset: 0
y_offset: 0
#z_offset: 17.875
speed: 10
samples: 3
samples_result: average
sample_retract_dist: 3
samples_tolerance: 0.02
samples_tolerance_retries: 5

[bed_mesh]
zero_reference_position: 0,0
algorithm: bicubic
speed: 50
horizontal_move_z: 20
mesh_radius: 125
mesh_origin: 0,0
round_probe_count: 21
mesh_pps: 3,3
fade_start: 2
fade_end: 10
split_delta_z: 0.05


[delta_calibrate]
radius: 135
horizontal_move_z: 25
Speed: 20

[stepper_a]
step_pin: PE3
dir_pin: PE2
enable_pin: !PE4
microsteps: 64 #16
rotation_distance: 40
endstop_pin: PA15
homing_speed: 30
#position_endstop: 336
homing_speed: 50
#arm_length: 315
#angle: 209


[tmc2209 stepper_a]
uart_pin: PD5
sense_resistor: 0.110
run_current: 1.150
#hold_current: 0.6
stealthchop_threshold: 999999
interpolate: false

[stepper_b]
step_pin: PE0
dir_pin: PB9
enable_pin: !PE1
microsteps: 64 #16
rotation_distance: 40
endstop_pin: PD2
homing_speed: 30
#position_endstop: 336
#arm_length: 315
#angle: 330


[tmc2209 stepper_b]
uart_pin: PD7
sense_resistor: 0.110
run_current: 1.150
hold_current: 0.6
stealthchop_threshold: 999999
interpolate: false

[stepper_c]
step_pin: PB5
dir_pin: PB4
enable_pin: !PB8
microsteps: 64 #16
rotation_distance: 40
endstop_pin: PC4
homing_speed: 30
#position_endstop: 336
#arm_length: 315
#angle: 90.000000


[tmc2209 stepper_c]
uart_pin: PD4
sense_resistor: 0.110
run_current: 1.150
#hold_current: 0.6
stealthchop_threshold: 999999
interpolate: false

[extruder]
step_pin: PD6
dir_pin: !PD3
enable_pin: !PB3
microsteps: 16
rotation_distance: 4.47 #22.7 #7.805
nozzle_diameter: 0.4
filament_diameter: 1.750
heater_pin: PE5
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC1
min_temp: 0
max_temp: 275
min_extrude_temp: 170
max_extrude_cross_section: 110 
max_extrude_only_distance: 1100

pressure_advance: 0.06
pressure_advance_smooth_time: 0.040

control: pid
pid_kp: 28.160
pid_ki: 1.304
pid_kd: 152.064


[verify_heater extruder]
check_gain_time: 120
heating_gain: 0.5

[input_shaper]
shaper_freq_x: 42.4
shaper_type_x: mzv
shaper_freq_y: 41.6
shaper_type_y: mzv

[tmc2209 extruder]
uart_pin: PD9
sense_resistor: 0.110
run_current: 0.800
#hold_current: 0.5
#stealthchop_threshold: 999999
interpolate: True #false

[heater_bed]
heater_pin: PA0
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC0
min_temp: 0
max_temp: 115

control: pid
pid_kp: 71.178
pid_ki: 1.719
pid_kd: 736.693



[heater_fan nozzle_cooling_fan]
pin: PB0

[fan]
pin: PC14

[controller_fan controller_fan]
pin: PB1

[filament_switch_sensor e0_sensor]
pause_on_runout: true
runout_gcode: 
  M600
switch_pin: PA4

[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32f407xx_2A0038000C51313339393731-if00
restart_method: rpi_usb

[printer]
kinematics: delta
max_velocity: 300
max_accel: 4000
#max_accel_to_decel: 4000
square_corner_velocity: 10
max_z_velocity: 200
max_z_accel: 2000
#delta_radius: 155
print_radius: 140
minimum_z_position: -5

[temperature_sensor mcu_temp]
sensor_type: temperature_mcu
min_temp: 0
max_temp: 100

[temperature_sensor Bed_2]
sensor_pin: PA2
sensor_type: EPCOS 100K B57560G104F
min_temp: 0
max_temp: 120

[mcu host]
serial: /tmp/klipper_host_mcu

[temperature_fan BTT-PI]
pin: host:gpio211
kick_start_time: 0.8
#shutdown_speed: 0
off_below: 0.1
max_power: 1.0
#fan_speed: 0.6
sensor_type: temperature_host
control: pid
min_temp: 0
max_temp: 85
#max_delta: 5.0
pid_kp: 1.0
pid_ki: 0.5
pid_kd: 2.0
min_speed: 0.1
max_speed: 1.0
target_temp: 40

#[temperature_sensor BTT-PI]
#sensor_type: temperature_host

#[tmc2209 stepper_e1]
#uart_pin: PB6
##interpolate: True
#run_current: 0.8
#hold_current: 0.5
#sense_resistor: 0.110
#stealthchop_threshold: 0

